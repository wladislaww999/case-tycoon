<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="info-btn" onclick="toggleInfo()">i</button>
            <div class="balance-badge"><span id="balance">100</span> 🎫</div>
        </header>

        <main class="main-content">
            <h1 class="gold-title">BRONZE CASE</h1>
            
            <div class="display-zone" id="display-zone">
                <img src="bronze-case-real.png" class="main-case-img" id="case-img" alt="Case">
            </div>

            <div class="buttons-group">
                <button class="action-btn green-btn" onclick="startSpin()">
                    ОТКРЫТЬ <span class="price">100 🎫</span>
                </button>
                <button class="action-btn blue-btn" onclick="addTicketsBatch()">
                    ▶ ПОЛУЧИТЬ +10 🎫
                </button>
            </div>
        </main>

        <div id="info-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="toggleInfo()">&times;</span>
                <h2 class="gold-text">СОДЕРЖИМОЕ КЕЙСА:</h2>
                <div class="loot-list">
                    <div class="loot-item mythic">
                        <img src="iphone.png" alt="iPhone">
                        <p>iPhone 15 Pro <br><span>Шанс: 0.001%</span></p>
                    </div>
                    <div class="loot-item mythic">
                        <img src="dyson.png" alt="Dyson">
                        <p>Dyson Airwrap <br><span>Шанс: 0.001%</span></p>
                    </div>
                    <div class="loot-item rare">
                        <img src="apple-watch.png" alt="Watch">
                        <p>Apple Watch 9 <br><span>Шанс: 0.01%</span></p>
                    </div>
                    <div class="loot-item common">
                        <div style="font-size: 30px;">🎫</div>
                        <p>50-100 Билетов <br><span>Шанс: 99.9%</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
