<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="user-info">
                <div class="avatar-container">
                    <div class="lvl-badge">1</div>
                </div>
                <div class="user-stats">
                    <div class="lvl-text">Lvl 1</div>
                    <div class="xp-text">До Lvl 2: 0/100 XP</div>
                </div>
            </div>
            <div class="balance-badge">
                <span id="balance">100</span>
                <img src="ticket.png" alt="ticket">
            </div>
        </header>

        <main class="main-content">
            <h1 class="case-title">BRONZE CASE</h1>
            
            <div class="case-display">
                <div class="case-glow"></div>
                <img src="bronze-case.png" id="main-case" alt="Case">
            </div>

            <div class="action-area">
                <button id="open-btn" class="btn btn-open">
                    ОТКРЫТЬ 
                    <div class="price-tag">
                        50 <img src="ticket.png" alt="t">
                    </div>
                </button>
                <button id="ads-btn" class="btn btn-ads">
                    ▶ ПОЛУЧИТЬ +10 <img src="ticket.png" alt="t">
                </button>
            </div>
        </main>

        <nav class="nav-bar">
            <div class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">ДОМ</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">МАГАЗИН</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">👥</span>
                <span class="nav-label">ДРУЗЬЯ</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">👤</span>
                <span class="nav-label">ПРОФИЛЬ</span>
            </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
