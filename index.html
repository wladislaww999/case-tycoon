<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="user-block">
            <div class="avatar-ring">
                <div class="lvl-badge">1</div>
            </div>
            <div class="user-info">
                <div class="lvl-text">
                    <h3>Lvl 1</h3>
                    <p>До Lvl 2: 0/100 XP</p>
                </div>
            </div>
        </div>
        <div class="balance-badge">100 🎫</div>
    </header>

    <main class="main-content">
        <h1 class="premium-gold-title">BRONZE CASE</h1>
        
        <img src="bronze-case.png" class="huge-case">

        <div class="action-area">
            <button class="btn btn-green">
                ОТКРЫТЬ <span class="price-box">50 🎫</span>
            </button>
            <button class="btn btn-blue">
                ▶ ПОЛУЧИТЬ +10 🎫
            </button>
        </div>
    </main>

    <nav class="nav-bar">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">ДОМ</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">МАГАЗИН</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">👥</span>
            <span class="nav-label">ДРУЗЬЯ</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-label">ПРОФИЛЬ</span>
        </div>
    </nav>
</div>
</body>
</html>
