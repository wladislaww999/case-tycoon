<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="info-btn" onclick="toggleInfo()">i</button>
            <button class="ref-btn" onclick="toggleTasks()">📜</button>
            <button class="ref-btn" onclick="toggleLeaderboard()">🏆</button>
            <button class="ref-btn" onclick="window.toggleReferral()">👥</button>

            <div class="balance-badge">
                <span id="balance">100</span> 
                <img src="coin.png" class="mini-icon">
            </div>
        </header>

        <main class="main-content">
            <h1 class="gold-title">CASE TYCOON</h1>
            <div class="display-zone">
                <img src="casetycoon.png" class="main-case-img" id="case-img" alt="Case">
            </div>

            <div class="buttons-group">
                <button class="action-btn green-btn btn-locked" onclick="window.startSpin()">
                    ОТКРЫТЬ ??? 🔒
                    <div class="price">100 <img src="coin.png" class="mini-icon"></div>
                </button>
                <button class="action-btn blue-btn" onclick="addTicketsBatch()">
                    ▶ ПОЛУЧИТЬ +10 <img src="coin.png" class="mini-icon">
                </button>
            </div>
        </main>

        <div id="tasks-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="toggleTasks()">&times;</span>
                <h2 class="gold-title" style="font-size: 24px; text-align: center; margin-bottom: 20px;">ЗАДАНИЯ</h2>
                <div id="task-list" class="loot-list"></div>
            </div>
        </div>

        <div id="leaderboard-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="toggleLeaderboard()">&times;</span>
                <h2 class="gold-title" style="font-size: 24px; text-align: center; margin-bottom: 20px;">ЛИДЕРЫ</h2>
                <div id="leader-list" class="loot-list"></div>
                <div class="my-rank-plate">Ваше место: <span id="my-rank">Загрузка...</span></div>
            </div>
        </div>

        <div id="info-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="toggleInfo()">&times;</span>
                <h2 class="gold-title" style="font-size: 24px; text-align: center; margin-bottom: 20px;">СОДЕРЖИМОЕ КЕЙСА</h2>
                <div class="loot-list">
                    <div class="loot-item mythic"><img src="iphone17promax.png"><p>iPhone 17 Pro Max</p></div>
                    <div class="loot-item rare"><img src="tgstars.png"><p>TG Stars (500-5000)</p></div>
                    <div class="loot-item common"><img src="coin.png"><p>Валюта (50-70 $)</p></div>
                </div>
            </div>
        </div>

        <div id="referral-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="window.toggleReferral()">&times;</span>
                <h2 class="gold-title" style="font-size: 24px; text-align: center; margin-bottom: 10px;">РЕФЕРАЛЫ</h2>
                <div class="ref-info-box"><p>Пригласи друга и получи <br><span class="gold-text">+300 КОИНОВ</span></p></div>
                <div class="ref-list-container">
                    <p class="ref-list-title">Список друзей:</p>
                    <div id="ref-list-empty" class="empty-list">Пока что нет друзей</div>
                </div>
                <button class="action-btn blue-btn" onclick="window.copyLink()" style="margin-top: 20px;">КОПИРОВАТЬ ССЫЛКУ</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
