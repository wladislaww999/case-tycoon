<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="info-btn" onclick="toggleInfo()">i</button>
            <div class="balance-badge"><span id="balance">100</span> 🎫</div>
        </header>

        <main class="main-content">
            <h1 class="gold-title">CASE TYCOON</h1>
            
            <div class="display-zone" id="display-zone">
                <img src="casetycoon.png" class="main-case-img" id="case-img" alt="Case">
            </div>

            <div class="buttons-group">
                <button class="action-btn green-btn" onclick="startSpin()">
                    ОТКРЫТЬ <span class="price">100 🎫</span>
                </button>
                <button class="action-btn blue-btn" onclick="addTicketsBatch()">
                    ▶ ПОЛУЧИТЬ +10 🎫
                </button>
            </div>
        </main>

        <div id="info-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="toggleInfo()">&times;</span>
                <h2 class="gold-text">СОДЕРЖИМОЕ КЕЙСА:</h2>
                <div class="loot-list">
                    <div class="loot-item mythic"><img src="iphone17promax.png"><p>iPhone 17 Pro Max</p></div>
                    <div class="loot-item mythic"><img src="macbook.png"><p>MacBook Pro</p></div>
                    <div class="loot-item rare"><img src="iphone17.png"><p>iPhone 17</p></div>
                    <div class="loot-item rare"><img src="ipad.png"><p>iPad Pro</p></div>
                    <div class="loot-item rare"><img src="applew.png"><p>Apple Watch</p></div>
                    <div class="loot-item special"><img src="usdt.png"><p>USDT Crypto</p></div>
                    <div class="loot-item special"><img src="tgprem.png"><p>TG Premium</p></div>
                    <div class="loot-item special"><img src="tgstars.png"><p>TG Stars</p></div>
                    <div class="loot-item common"><img src="dollar.png"><p>Набор Валюты</p></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
