<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <div class="user-block">
                <div class="avatar-ring-empty">
                    <div class="level-tag-centered">1</div>
                </div>
                <div class="user-text">
                    <h3>Lvl 1</h3>
                    <p>До Lvl 2: 0/100 XP</p>
                </div>
            </div>
            <div class="balance-pill">
                <span class="balance-num">100</span>
                <img src="ticket.png" class="ticket-main">
            </div>
        </header>

        <main class="game-area">
            <h1 class="gold-title">BRONZE CASE</h1>
            
            <div class="case-container">
                <img src="bronze-case.png" class="mega-case" id="main-case">
            </div>
            
            <div class="action-buttons">
                <button id="open-btn" class="btn-v1-green">
                    ОТКРЫТЬ <div class="price-box">50 <img src="ticket.png" class="ticket-btn"></div>
                </button>
                <button id="ads-btn" class="btn-v1-blue">
                    ▶ ПОЛУЧИТЬ +10 <img src="ticket.png" class="ticket-btn">
                </button>
            </div>
        </main>

        <nav class="footer-nav">
            <div class="nav-tab active">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">ДОМ</span>
            </div>
            <div class="nav-tab">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">МАГАЗИН</span>
            </div>
            <div class="nav-tab">
                <span class="nav-icon">👥</span>
                <span class="nav-label">ДРУЗЬЯ</span>
            </div>
            <div class="nav-tab">
                <span class="nav-icon">👤</span>
                <span class="nav-label">ПРОФИЛЬ</span>
            </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
